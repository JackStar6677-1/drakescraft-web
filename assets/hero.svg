<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#140828"/>
      <stop offset="60%" stop-color="#080314"/>
      <stop offset="100%" stop-color="#040108"/>
    </radialGradient>
    
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffeaa7"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#aa7c11"/>
    </linearGradient>
    
    <!-- Purple Portal Gradient -->
    <radialGradient id="portalGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#6b21a8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3b0764" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.03); }
    }
    @keyframes floatParticle {
      0% { transform: translateY(80px) translateX(0) scale(0.8); opacity: 0; }
      50% { opacity: 0.8; }
      100% { transform: translateY(-120px) translateX(15px) scale(0.4); opacity: 0; }
    }
    @keyframes rotatePortal {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    .portal-core {
      animation: pulseGlow 4s infinite ease-in-out;
      transform-origin: 620px 150px;
    }
    .portal-spiral {
      animation: rotatePortal 20s infinite linear;
      transform-origin: 620px 150px;
    }
    .particle {
      animation: floatParticle 6s infinite ease-in;
    }
    .star {
      animation: blink 3s infinite ease-in-out;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bgGrad)"/>

  <!-- Cosmic Stars (Twinkling) -->
  <g fill="#ffffff" fill-opacity="0.3">
    <circle cx="80" cy="50" r="1.5" class="star" style="animation-delay: 0.2s;"/>
    <circle cx="210" cy="70" r="2" class="star" style="animation-delay: 1.5s;" fill="#ffeaa7"/>
    <circle cx="340" cy="40" r="1" class="star" style="animation-delay: 0.8s;"/>
    <circle cx="150" cy="220" r="2" class="star" style="animation-delay: 2.1s;" fill="#d946ef"/>
    <circle cx="480" cy="90" r="1.5" class="star" style="animation-delay: 1.1s;"/>
    <circle cx="400" cy="240" r="2.5" class="star" style="animation-delay: 0s;"/>
  </g>

  <!-- Portal Aura & Frame -->
  <g class="portal-core">
    <!-- Outer Glow -->
    <ellipse cx="620" cy="150" rx="75" ry="115" fill="#a855f7" opacity="0.3" filter="url(#glow)"/>
    <!-- Portal Frame (Obsidian Theme with Runes) -->
    <ellipse cx="620" cy="150" rx="65" ry="105" fill="none" stroke="url(#goldGrad)" stroke-width="4" filter="url(#glow)"/>
    <ellipse cx="620" cy="150" rx="60" ry="100" fill="url(#portalGrad)"/>
  </g>

  <!-- Portal Interior Elements (Rotating Spiral) -->
  <g class="portal-spiral" opacity="0.5">
    <path d="M 620 50 A 100 100 0 0 1 720 150 A 100 100 0 0 1 620 250 A 100 100 0 0 1 520 150 Z" fill="none" stroke="#d946ef" stroke-width="1.5" stroke-dasharray="10, 15"/>
    <path d="M 620 70 A 80 80 0 0 1 700 150 A 80 80 0 0 1 620 230 A 80 80 0 0 1 540 150 Z" fill="none" stroke="url(#goldGrad)" stroke-width="1" stroke-dasharray="8, 12"/>
  </g>

  <!-- Floating Minecraft Portal Particles -->
  <g fill="#d946ef" opacity="0.8">
    <rect x="590" y="190" width="6" height="6" class="particle" style="animation-delay: 0s;"/>
    <rect x="630" y="170" width="8" height="8" class="particle" style="animation-delay: 1.5s;"/>
    <rect x="610" y="210" width="5" height="5" class="particle" style="animation-delay: 3s;"/>
    <rect x="650" y="180" width="6" height="6" class="particle" style="animation-delay: 4.5s;"/>
    <rect x="580" y="160" width="4" height="4" class="particle" style="animation-delay: 2.2s;"/>
  </g>

  <!-- Typography / Brand Titles -->
  <g transform="translate(60, 90)">
    <text x="0" y="0" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#a855f7" letter-spacing="4" opacity="0.9">
      MINECRAFT ODYSSEY &amp; SLIMEFUN
    </text>
    <text x="-2" y="45" font-family="'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="800" fill="url(#goldGrad)" letter-spacing="2" filter="url(#glow)">
      DrakesCraft
    </text>
    <text x="0" y="75" font-family="'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="300" fill="#ffffff" opacity="0.8" letter-spacing="0.5">
      Sitio Oficial del Servidor Survival de Alta Gama
    </text>
  </g>

  <!-- Status / Connection Indicator -->
  <g transform="translate(60, 240)">
    <circle cx="10" cy="10" r="5" fill="#d4af37" filter="url(#glow)" class="star"/>
    <text x="25" y="14" font-family="monospace" font-size="12" fill="#d4af37" font-weight="bold" letter-spacing="1">
      IP: PLAY.DRAKESCRAFT.CL (PORT: 25565 / BEDROCK: 19132)
    </text>
  </g>
</svg>
